<!--
  MDS Storybook manager-head — manager iframe fonts + chrome overrides.

  Single source of truth for manager-iframe styling:

  1. @font-face declarations live here (not in a CSS file imported by
     manager.ts) because Storybook's manager bundler (esbuild) tries to
     resolve url(...) references at build time and has no .otf loader.
     Raw HTML bypasses the bundler; the browser fetches the font files
     at runtime from the /fonts/* path that main.ts maps via staticDirs.

  2. Selectors that override Storybook's chrome (currently: sidebar
     brand title font / size) live here too. They reference fonts by
     family name only — no url() references — so they would survive
     the bundler, but keeping all manager-iframe styling in one file
     is simpler than splitting between an HTML head and a CSS module.
-->
<style>
  @font-face {
    font-family: 'Akkurat Pro';
    font-weight: 400;
    font-style: normal;
    font-display: swap;
    src: url('/fonts/AkkuratPro-Regular.otf') format('opentype');
  }

  @font-face {
    font-family: 'Akkurat Pro';
    font-weight: 700;
    font-style: normal;
    font-display: swap;
    src: url('/fonts/AkkuratPro-Bold.otf') format('opentype');
  }

  @font-face {
    font-family: 'Manyone';
    font-weight: 400;
    font-style: normal;
    font-display: swap;
    src: url('/fonts/Manyone-Regular.otf') format('opentype');
  }

  @font-face {
    font-family: 'Manyone';
    font-weight: 400;
    font-style: italic;
    font-display: swap;
    src: url('/fonts/Manyone-RegularItalic.otf') format('opentype');
  }

  /*
   * Sidebar brand title — Manyone at h3-ish size.
   * Selectors target Storybook v10's emotion-hashed class names; the
   * `sidebar-header` / `sidebar-subheading` substrings are stable.
   */
  .sidebar-header a,
  .sidebar-header a span,
  [class*="sidebar-header"] a,
  [class*="sidebar-header"] a span,
  .sidebar-subheading,
  [class*="sidebar-subheading"] {
    font-family: 'Manyone', system-ui, sans-serif !important;
    font-size: 20px !important;
    font-weight: 600 !important;
    letter-spacing: -0.01em;
  }
</style>
