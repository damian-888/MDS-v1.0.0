<!-- packages/mds-tokens/test-fixtures/smoke.html
     Open in a browser. Each cell shows what the cascade resolves to for that
     attribute combo. Eyeball the colours; cells should differ from each other
     and the values should look sensible. -->
<!doctype html>
<html lang="en" data-mode="light" data-section="normal" data-scheme="neutral">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../dist/tokens.css" />
    <link rel="stylesheet" href="../dist/typography.css" />
    <style>
      body { margin: 0; padding: 24px; font-family: system-ui; }
      .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
      .cell {
        background: var(--mds-colours-basic-background);
        color: var(--mds-colours-basic-text);
        border: 1px solid var(--mds-colours-basic-stroke);
        padding: 16px;
        min-height: 64px;
      }
      .cell .accent {
        background: var(--mds-colours-basic-accent);
        color: var(--mds-colours-basic-text-on-accent);
        padding: 4px 8px;
        margin-top: 8px;
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <h1 class="mds-typography-h1">MDS Tokens smoke test</h1>
    <p class="mds-typography-body">Each cell is wrapped in a different attribute combo. They should look distinct.</p>
    <div class="grid">
      <div class="cell"><strong>defaults</strong><br /><span class="accent">accent</span></div>
      <div class="cell" data-mode="dark"><strong>dark</strong><br /><span class="accent">accent</span></div>
      <div class="cell" data-section="subtle"><strong>subtle</strong><br /><span class="accent">accent</span></div>
      <div class="cell" data-scheme="brand"><strong>brand</strong><br /><span class="accent">accent</span></div>
      <div class="cell" data-scheme="success"><strong>success</strong><br /><span class="accent">accent</span></div>
      <div class="cell" data-scheme="error"><strong>error</strong><br /><span class="accent">accent</span></div>
      <div class="cell" data-scheme="warning"><strong>warning</strong><br /><span class="accent">accent</span></div>
      <div class="cell" data-scheme="info"><strong>info</strong><br /><span class="accent">accent</span></div>
      <div class="cell" data-mode="dark" data-section="subtle" data-scheme="error">
        <strong>dark + subtle + error</strong><br /><span class="accent">accent</span>
      </div>
    </div>
  </body>
</html>
